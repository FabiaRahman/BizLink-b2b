<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizLink - Refunds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        biz: {
                            bg: '#0f1419', card: '#161b22', border: '#21262d', sidebar: '#0d1117',
                            primary: '#22c55e', primaryDark: '#16a34a', text: '#e6edf3', muted: '#8b949e'
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #8b949e;
            border-left: 2px solid transparent;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background-color: #161b22;
            color: #e6edf3;
        }

        .nav-link.active {
            background-color: #161b22;
            color: #22c55e;
            border-left-color: #22c55e;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f1419;
        }

        ::-webkit-scrollbar-thumb {
            background: #21262d;
            border-radius: 4px;
        }
    </style>
</head>

<body class="bg-biz-bg text-biz-text font-sans flex h-screen overflow-hidden">
    <aside class="w-64 bg-biz-sidebar border-r border-biz-border flex flex-col flex-shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-biz-border">
            <span class="text-xl font-bold text-biz-primary">Biz<span class="text-white">Link</span></span>
        </div>
        <nav class="flex-1 py-4 overflow-y-auto"></nav>
        <div class="p-4 border-t border-biz-border bg-biz-sidebar">
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full bg-biz-primary flex items-center justify-center text-xs font-bold text-white"
                        id="user-avatar">U</div>
                    <div class="ml-3">
                        <p class="text-sm font-medium text-white" id="user-name">User</p>
                        <p class="text-xs text-biz-muted" id="user-role">Workspace</p>
                    </div>
                </div>
                <button onclick="BizLinkAuth.logout()" class="text-biz-muted hover:text-red-400 text-sm">Logout</button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-biz-card border-b border-biz-border flex justify-between items-center px-6">
            <h2 class="text-lg font-semibold">Refund Management</h2>
            <button onclick="openNewRefundModal()"
                class="px-4 py-2 bg-biz-primary hover:bg-biz-primaryDark text-white rounded-lg text-sm font-medium transition">+
                Request Refund</button>
        </header>

        <div class="flex-1 overflow-y-auto p-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                <div class="bg-biz-card p-4 rounded-xl border border-biz-border">
                    <p class="text-biz-muted text-sm">Total Refunds</p>
                    <p class="text-2xl font-bold text-white mt-1" id="stat-total">0</p>
                </div>
                <div class="bg-biz-card p-4 rounded-xl border border-biz-border">
                    <p class="text-biz-muted text-sm">Pending</p>
                    <p class="text-2xl font-bold text-yellow-400 mt-1" id="stat-pending">0</p>
                </div>
                <div class="bg-biz-card p-4 rounded-xl border border-biz-border">
                    <p class="text-biz-muted text-sm">Approved</p>
                    <p class="text-2xl font-bold text-green-400 mt-1" id="stat-approved">0</p>
                </div>
                <div class="bg-biz-card p-4 rounded-xl border border-biz-border">
                    <p class="text-biz-muted text-sm">Rejected</p>
                    <p class="text-2xl font-bold text-red-400 mt-1" id="stat-rejected">0</p>
                </div>
            </div>

            <div class="bg-biz-card p-4 rounded-xl border border-biz-border mb-6">
                <div class="flex gap-4 flex-wrap">
                    <select id="filter-status"
                        class="bg-biz-bg border border-biz-border rounded-lg px-3 py-2 text-sm focus:border-biz-primary focus:outline-none">
                        <option value="">All Statuses</option>
                        <option value="pending">Pending</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                    </select>
                    <input type="date" id="filter-date"
                        class="bg-biz-bg border border-biz-border rounded-lg px-3 py-2 text-sm focus:border-biz-primary focus:outline-none">
                    <button onclick="loadRefunds()"
                        class="px-4 py-2 bg-biz-primary hover:bg-biz-primaryDark text-white rounded-lg text-sm transition">Apply
                        Filters</button>
                </div>
            </div>

            <div class="bg-biz-card rounded-xl border border-biz-border overflow-hidden">
                <table class="w-full text-left text-sm text-biz-muted">
                    <thead class="bg-biz-bg text-xs uppercase">
                        <tr>
                            <th class="px-6 py-3">Refund ID</th>
                            <th class="px-6 py-3">Order ID</th>
                            <th class="px-6 py-3">Customer</th>
                            <th class="px-6 py-3">Amount</th>
                            <th class="px-6 py-3">Reason</th>
                            <th class="px-6 py-3">Status</th>
                            <th class="px-6 py-3">Validation</th>
                            <th class="px-6 py-3">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="refunds-list" class="divide-y divide-biz-border">
                        <tr>
                            <td colspan="8" class="px-6 py-8 text-center text-biz-muted">Loading refunds...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- New Refund Modal -->
    <div id="new-refund-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-biz-card border border-biz-border rounded-xl p-6 w-full max-w-2xl">
            <h3 class="text-lg font-semibold text-white mb-4">Request Refund</h3>
            <form id="new-refund-form" class="space-y-4">
                <div><label class="block text-sm text-biz-muted mb-2">Order ID *</label><input type="number"
                        id="refund-order-id" required
                        class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg text-white focus:border-biz-primary focus:outline-none">
                </div>
                <div><label class="block text-sm text-biz-muted mb-2">Customer Contact *</label><input type="text"
                        id="refund-customer-contact" required
                        class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg text-white focus:border-biz-primary focus:outline-none">
                </div>
                <div><label class="block text-sm text-biz-muted mb-2">Refund Amount *</label><input type="number"
                        id="refund-amount" required min="0" step="0.01"
                        class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg text-white focus:border-biz-primary focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm text-biz-muted mb-2">Refund Reason *</label>
                    <select id="refund-reason-select" onchange="handleRefundReasonChange()"
                        class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg text-white focus:border-biz-primary focus:outline-none mb-3">
                        <option value="">Select a reason...</option>
                        <option value="Defective Product">Defective Product</option>
                        <option value="Wrong Item Received">Wrong Item Received</option>
                        <option value="Not As Described">Not As Described</option>
                        <option value="Customer Changed Mind">Changed My Mind</option>
                        <option value="Duplicate Order">Duplicate Order</option>
                        <option value="Late Delivery">Late Delivery</option>
                        <option value="Other">Other (Please specify below)</option>
                    </select>
                    <textarea id="refund-reason" required rows="3"
                        placeholder="Please provide more details about your refund reason..."
                        class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg text-white focus:border-biz-primary focus:outline-none"></textarea>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="submit"
                        class="flex-1 px-4 py-2 bg-biz-primary hover:bg-biz-primaryDark text-white rounded-lg font-medium transition">Submit
                        Request</button>
                    <button type="button" onclick="closeNewRefundModal()"
                        class="flex-1 px-4 py-2 bg-biz-card border border-biz-border hover:border-biz-primary text-biz-text rounded-lg font-medium transition">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navigation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (!BizLinkAuth.checkAuth()) return;
            BizLinkNav.init();
            loadRefunds();
        });

        async function loadRefunds() {
            const list = document.getElementById('refunds-list');
            const statusFilter = document.getElementById('filter-status').value;
            const dateFilter = document.getElementById('filter-date').value;

            try {
                let url = '/refunds';
                const params = [];
                if (statusFilter) params.push(`status_filter=${statusFilter}`);
                if (dateFilter) params.push(`date=${dateFilter}`);
                if (params.length > 0) url += `?${params.join('&')}`;

                const refunds = await BizLinkAPI.call(url);

                document.getElementById('stat-total').textContent = refunds.length;
                document.getElementById('stat-pending').textContent = refunds.filter(r => r.refund_status === 'pending').length;
                document.getElementById('stat-approved').textContent = refunds.filter(r => r.refund_status === 'approved').length;
                document.getElementById('stat-rejected').textContent = refunds.filter(r => r.refund_status === 'rejected').length;

                if (refunds.length === 0) {
                    list.innerHTML = '<tr><td colspan="8" class="px-6 py-8 text-center text-biz-muted">No refunds found</td></tr>';
                    return;
                }

                list.innerHTML = refunds.map(refund => `
                    <tr class="hover:bg-biz-bg transition-colors">
                        <td class="px-6 py-4 font-medium text-white">#${refund.id}</td>
                        <td class="px-6 py-4 text-white">#${refund.order_id}</td>
                        <td class="px-6 py-4">${refund.customer_contact}</td>
                        <td class="px-6 py-4 text-white">$${refund.refund_amount}</td>
                        <td class="px-6 py-4 max-w-xs truncate">${refund.refund_reason}</td>
                        <td class="px-6 py-4"><span class="px-2 py-1 rounded text-xs ${getStatusBadge(refund.refund_status)}">${refund.refund_status}</span></td>
                        <td class="px-6 py-4">
                            ${refund.refund_status === 'approved' ? '<span class="text-green-400 text-xs">✓ Policy Validated</span>' :
                        refund.refund_status === 'rejected' ? '<span class="text-red-400 text-xs">✗ Policy Violation</span>' :
                            '<span class="text-yellow-400 text-xs">⏳ Validating...</span>'}
                        </td>
                        <td class="px-6 py-4"><button onclick="viewRefund(${refund.id})" class="text-biz-primary hover:underline text-sm">View</button></td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error('Failed to load refunds:', err);
                loadDemoRefunds(dateFilter);
            }
        }

        function getStatusBadge(status) {
            const badges = { pending: 'bg-yellow-900/30 text-yellow-400', approved: 'bg-green-900/30 text-green-400', rejected: 'bg-red-900/30 text-red-400', processing: 'bg-blue-900/30 text-blue-400' };
            return badges[status] || 'bg-gray-900/30 text-gray-400';
        }

        function loadDemoRefunds(dateFilter) {
            const demoRefunds = [
                { id: 1, order_id: 315, customer_contact: 'mamun@example.com', refund_amount: 149.50, refund_reason: 'Product defective', refund_status: 'approved', requested_at: new Date().toISOString() },
                { id: 2, order_id: 314, customer_contact: 'monirul@example.com', refund_amount: 999.00, refund_reason: 'Changed mind', refund_status: 'pending', requested_at: new Date().toISOString() },
                { id: 3, order_id: 310, customer_contact: 'old@example.com', refund_amount: 49.99, refund_reason: 'Not satisfied', refund_status: 'rejected', requested_at: new Date().toISOString() }
            ];

            let filtered = demoRefunds;
            if (dateFilter) {
                filtered = demoRefunds.filter(r => {
                    const itemDate = new Date(r.requested_at).toISOString().split('T')[0];
                    return itemDate === dateFilter;
                });
            }

            const list = document.getElementById('refunds-list');
            list.innerHTML = '<tr class="bg-yellow-900/10"><td colspan="8" class="px-6 py-2 text-center text-yellow-400 text-xs">⚠️ Showing demo data</td></tr>' +
                filtered.map(refund => `
                    <tr class="hover:bg-biz-bg transition-colors">
                        <td class="px-6 py-4 font-medium text-white">#${refund.id}</td>
                        <td class="px-6 py-4 text-white">#${refund.order_id}</td>
                        <td class="px-6 py-4">${refund.customer_contact}</td>
                        <td class="px-6 py-4 text-white">$${refund.refund_amount}</td>
                        <td class="px-6 py-4 max-w-xs truncate">${refund.refund_reason}</td>
                        <td class="px-6 py-4"><span class="px-2 py-1 rounded text-xs ${getStatusBadge(refund.refund_status)}">${refund.refund_status}</span></td>
                        <td class="px-6 py-4">
                            ${refund.refund_status === 'approved' ? '<span class="text-green-400 text-xs">✓ Policy Validated</span>' :
                        refund.refund_status === 'rejected' ? '<span class="text-red-400 text-xs">✗ Policy Violation</span>' :
                            '<span class="text-yellow-400 text-xs">⏳ Validating...</span>'}
                        </td>
                        <td class="px-6 py-4"><button onclick="viewRefund(${refund.id})" class="text-biz-primary hover:underline text-sm">View</button></td>
                    </tr>
                `).join('');
        }

        function openNewRefundModal() {
            document.getElementById('new-refund-modal').classList.remove('hidden');
            document.getElementById('new-refund-modal').classList.add('flex');
        }

        function closeNewRefundModal() {
            document.getElementById('new-refund-modal').classList.add('hidden');
            document.getElementById('new-refund-modal').classList.remove('flex');
            document.getElementById('new-refund-form').reset();
        }

        function handleRefundReasonChange() {
            const select = document.getElementById('refund-reason-select');
            const textarea = document.getElementById('refund-reason');

            if (select.value === 'Other') {
                textarea.placeholder = 'Please describe your reason in detail...';
                textarea.value = '';
                textarea.focus();
            } else if (select.value) {
                textarea.value = select.value;
                textarea.placeholder = 'Add more details if needed...';
            } else {
                textarea.value = '';
                textarea.placeholder = 'Please provide more details about your refund reason...';
            }
        }

        document.getElementById('new-refund-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const refundData = {
                order_id: parseInt(document.getElementById('refund-order-id').value),
                customer_contact: document.getElementById('refund-customer-contact').value,
                refund_amount: parseFloat(document.getElementById('refund-amount').value),
                refund_reason: document.getElementById('refund-reason').value
            };
            try {
                await BizLinkAPI.call('/refunds', { method: 'POST', body: JSON.stringify(refundData) });
                alert('Refund request submitted!');
                closeNewRefundModal();
                loadRefunds();
            } catch (err) { alert('Failed: ' + err.message); }
        });

        async function viewRefund(id) {
            try {
                const refunds = await BizLinkAPI.call('/refunds');
                const refund = refunds.find(r => r.id === id);

                if (!refund) {
                    alert('Refund not found');
                    return;
                }

                const modalContent = `
                    <div class="fixed inset-0 bg-black/70 flex items-center justify-center z-50" id="view-refund-modal">
                        <div class="bg-biz-card border border-biz-border rounded-xl p-6 w-full max-w-2xl">
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="text-xl font-semibold text-white">Refund Details #${refund.id}</h3>
                                <button onclick="closeViewRefundModal()" class="text-biz-muted hover:text-white text-2xl">&times;</button>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-6 mb-6">
                                <div>
                                    <p class="text-biz-muted text-sm mb-1">Order ID</p>
                                    <p class="text-white font-medium">#${refund.order_id}</p>
                                </div>
                                <div>
                                    <p class="text-biz-muted text-sm mb-1">Status</p>
                                    <p class="text-white font-medium capitalize">${refund.refund_status}</p>
                                </div>
                                <div>
                                    <p class="text-biz-muted text-sm mb-1">Customer Contact</p>
                                    <p class="text-white">${refund.customer_contact}</p>
                                </div>
                                <div>
                                    <p class="text-biz-muted text-sm mb-1">Refund Amount</p>
                                    <p class="text-white font-medium">$${refund.refund_amount}</p>
                                </div>
                                <div class="col-span-2">
                                    <p class="text-biz-muted text-sm mb-1">Refund Reason</p>
                                    <p class="text-white bg-biz-bg p-3 rounded border border-biz-border">${refund.refund_reason}</p>
                                </div>
                                <div>
                                    <p class="text-biz-muted text-sm mb-1">Requested At</p>
                                    <p class="text-white">${new Date(refund.requested_at).toLocaleString()}</p>
                                </div>
                                ${refund.approved_at ? `
                                <div>
                                    <p class="text-biz-muted text-sm mb-1">Approved At</p>
                                    <p class="text-white">${new Date(refund.approved_at).toLocaleString()}</p>
                                </div>
                                ` : ''}
                            </div>
                            
                            <div class="flex justify-end">
                                <button onclick="closeViewRefundModal()" class="px-4 py-2 bg-biz-card border border-biz-border hover:border-biz-primary text-white rounded-lg transition">Close</button>
                            </div>
                        </div>
                    </div>
                `;

                document.body.insertAdjacentHTML('beforeend', modalContent);
            } catch (err) {
                console.error('Failed to load refund details:', err);
                alert('Failed to load refund details');
            }
        }

        function closeViewRefundModal() {
            const modal = document.getElementById('view-refund-modal');
            if (modal) {
                modal.remove();
            }
        }
    </script>
</body>

</html>
