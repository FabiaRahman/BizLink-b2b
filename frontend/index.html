<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizLink - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        biz: {
                            bg: '#0f1419',
                            card: '#161b22',
                            border: '#21262d',
                            sidebar: '#0d1117',
                            primary: '#22c55e',
                            primaryDark: '#16a34a',
                            text: '#e6edf3',
                            muted: '#8b949e'
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #8b949e;
            border-left: 2px solid transparent;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background-color: #161b22;
            color: #e6edf3;
        }

        .nav-link.active {
            background-color: #161b22;
            color: #22c55e;
            border-left-color: #22c55e;
        }

        .role-btn {
            padding: 0.5rem 1rem;
            border: 1px solid #21262d;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .role-btn:hover {
            border-color: #22c55e;
        }

        .role-btn.selected {
            background-color: #22c55e;
            border-color: #22c55e;
            color: white;
        }
    </style>
</head>

<body class="bg-biz-bg text-biz-text flex items-center justify-center min-h-screen">
    <div class="bg-biz-card border border-biz-border p-8 rounded-xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-biz-primary">BizLink</h1>
            <p class="text-biz-muted mt-1" id="form-title">Sign In</p>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-4">
            <input type="email" id="login-email" placeholder="Email Address" required
                class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg focus:outline-none focus:border-biz-primary transition text-white">
            <input type="password" id="login-password" placeholder="Password" required minlength="6"
                class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg focus:outline-none focus:border-biz-primary transition text-white">
            <button type="submit"
                class="w-full bg-biz-primary text-white font-semibold p-3 rounded-lg hover:bg-biz-primaryDark transition">Login</button>
            <div class="flex justify-between text-sm">
                <button type="button" onclick="toggleForm('register')" class="text-biz-primary hover:underline">Create
                    Account</button>
                <button type="button" onclick="toggleForm('forgot')" class="text-biz-muted hover:text-biz-text">Forgot
                    Password?</button>
            </div>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="space-y-4 hidden">
            <input type="text" id="reg-name" placeholder="Full Name" required
                class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg focus:outline-none focus:border-biz-primary transition text-white">
            <input type="email" id="reg-email" placeholder="Email Address" required
                class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg focus:outline-none focus:border-biz-primary transition text-white">
            <input type="password" id="reg-password" placeholder="Password (min 6 chars)" required minlength="6"
                class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg focus:outline-none focus:border-biz-primary transition text-white">
            <input type="password" id="reg-confirm" placeholder="Confirm Password" required minlength="6"
                class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg focus:outline-none focus:border-biz-primary transition text-white">

            <p class="text-sm text-biz-muted mt-2">Select your role:</p>
            <div class="grid grid-cols-1 gap-2">
                <button type="button" onclick="selectRole(this, 'admin')" class="role-btn selected">
                    👤 Admin - Full system access
                </button>
                <button type="button" onclick="selectRole(this, 'manager')" class="role-btn">
                    📋 Manager - Review and approve workflows
                </button>
                <button type="button" onclick="selectRole(this, 'operator')" class="role-btn">
                    ⚙️ Operator - Execute and monitor tasks
                </button>
            </div>
            <input type="hidden" id="selected-role" value="admin">

            <button type="submit"
                class="w-full bg-biz-primary text-white font-semibold p-3 rounded-lg hover:bg-biz-primaryDark transition mt-2">Create
                Account</button>
            <p class="text-center text-sm text-biz-muted">Already have an account? <button type="button"
                    onclick="toggleForm('login')" class="text-biz-primary hover:underline">Log in</button></p>
        </form>

        <!-- Forgot Password Form -->
        <form id="forgot-form" class="space-y-4 hidden">
            <p class="text-sm text-biz-muted mb-4">Enter your registered email address and we'll send you a link to
                reset your password.</p>
            <input type="email" id="forgot-email" placeholder="Email Address" required
                class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg focus:outline-none focus:border-biz-primary transition text-white">
            <button type="submit"
                class="w-full bg-biz-primary text-white font-semibold p-3 rounded-lg hover:bg-biz-primaryDark transition">Send
                Reset Link</button>
            <p class="text-center text-sm text-biz-muted">Remembered password? <button type="button"
                    onclick="toggleForm('login')" class="text-biz-primary hover:underline">Log in</button></p>
        </form>

        <p id="error-msg" class="text-red-400 text-sm mt-4 hidden text-center"></p>
        <p id="success-msg" class="text-biz-primary text-sm mt-4 hidden text-center"></p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // ✅ Check if already logged in and redirect to appropriate dashboard
        if (localStorage.getItem('bizlink_token')) {
            const user = JSON.parse(localStorage.getItem('bizlink_user') || '{}');
            const role = user.role || 'operator';

            // Redirect based on role
            if (role === 'admin') {
                window.location.href = 'dashboard.html';
            } else if (role === 'manager') {
                window.location.href = 'dashboard-manager.html';
            } else {
                window.location.href = 'dashboard-operator.html';
            }
        }

        function toggleForm(target) {
            // Hide all forms first
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('forgot-form').classList.add('hidden');

            // Show target form
            if (target === 'login') document.getElementById('login-form').classList.remove('hidden');
            else if (target === 'register') document.getElementById('register-form').classList.remove('hidden');
            else if (target === 'forgot') document.getElementById('forgot-form').classList.remove('hidden');

            // Update title
            const titles = { login: 'Sign In', register: 'Create Account', forgot: 'Reset Password' };
            document.getElementById('form-title').textContent = titles[target];

            // Clear messages
            document.getElementById('error-msg').classList.add('hidden');
            document.getElementById('success-msg').classList.add('hidden');
        }

        function selectRole(btn, role) {
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            document.getElementById('selected-role').value = role;
        }

        // Login Handler
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const msg = document.getElementById('error-msg');
            msg.classList.add('hidden');
            msg.className = 'text-red-400 text-sm mt-4 text-center';

            try {
                const success = await BizLinkAuth.login(email, password);
                if (success) {
                    // ✅ Get user role and redirect to appropriate dashboard
                    const user = BizLinkAuth.getUser();
                    const role = user.role || 'operator';

                    if (role === 'admin') {
                        window.location.href = 'dashboard.html';
                    } else if (role === 'manager') {
                        window.location.href = 'dashboard-manager.html';
                    } else {
                        window.location.href = 'dashboard-operator.html';
                    }
                } else {
                    msg.textContent = 'Invalid credentials';
                    msg.classList.remove('hidden');
                }
            } catch (err) {
                msg.textContent = err.message;
                msg.classList.remove('hidden');
            }
        });

        // Register Handler
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;
            const role = document.getElementById('selected-role').value;
            const msg = document.getElementById('error-msg');
            msg.classList.add('hidden');
            msg.className = 'text-red-400 text-sm mt-4 text-center';

            if (!name || !email || !pass || !confirm || !role) {
                msg.textContent = 'Please fill in all fields';
                msg.classList.remove('hidden');
                return;
            }
            if (pass.length < 6) {
                msg.textContent = 'Password must be at least 6 characters';
                msg.classList.remove('hidden');
                return;
            }
            if (pass !== confirm) {
                msg.textContent = 'Passwords do not match';
                msg.classList.remove('hidden');
                return;
            }

            try {
                await BizLinkAuth.register(name, email, pass, role);
                toggleForm('login');
                document.getElementById('success-msg').textContent = 'Registration successful! Please login.';
                document.getElementById('success-msg').classList.remove('hidden');
            } catch (err) {
                msg.className = 'text-red-400 text-sm mt-4 text-center';
                msg.textContent = err.message;
                msg.classList.remove('hidden');
            }
        });

        // Forgot Password Handler
        document.getElementById('forgot-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('forgot-email').value;
            if (!email.includes('@')) {
                document.getElementById('error-msg').textContent = 'Please enter a valid email';
                document.getElementById('error-msg').classList.remove('hidden');
                return;
            }
            // In production, this would call a backend endpoint
            document.getElementById('success-msg').textContent = 'Reset link sent to ' + email;
            document.getElementById('success-msg').classList.remove('hidden');
            setTimeout(() => toggleForm('login'), 3000);
        });
    </script>
</body>

</html>
