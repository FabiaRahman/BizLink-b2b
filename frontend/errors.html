<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizLink - Error Logs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        biz: {
                            bg: '#0f1419', card: '#161b22', border: '#21262d', sidebar: '#0d1117',
                            primary: '#22c55e', primaryDark: '#16a34a', text: '#e6edf3', muted: '#8b949e'
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #8b949e;
            border-left: 2px solid transparent;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background-color: #161b22;
            color: #e6edf3;
        }

        .nav-link.active {
            background-color: #161b22;
            color: #22c55e;
            border-left-color: #22c55e;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f1419;
        }

        ::-webkit-scrollbar-thumb {
            background: #21262d;
            border-radius: 4px;
        }
    </style>
</head>

<body class="bg-biz-bg text-biz-text font-sans flex h-screen overflow-hidden">
    <aside class="w-64 bg-biz-sidebar border-r border-biz-border flex flex-col flex-shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-biz-border">
            <span class="text-xl font-bold text-biz-primary">Biz<span class="text-white">Link</span></span>
        </div>
        <nav class="flex-1 py-4 overflow-y-auto"></nav>
        <div class="p-4 border-t border-biz-border bg-biz-sidebar">
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full bg-biz-primary flex items-center justify-center text-xs font-bold text-white"
                        id="user-avatar">U</div>
                    <div class="ml-3">
                        <p class="text-sm font-medium text-white" id="user-name">User</p>
                        <p class="text-xs text-biz-muted" id="user-role">Workspace</p>
                    </div>
                </div>
                <button onclick="BizLinkAuth.logout()" class="text-biz-muted hover:text-red-400 text-sm">Logout</button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-biz-card border-b border-biz-border flex justify-between items-center px-6">
            <h2 class="text-lg font-semibold">Error Audit Logs</h2>
            <button onclick="exportLogs()"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition">📥
                Export Logs</button>
        </header>

        <div class="flex-1 overflow-y-auto p-6">
            <div class="bg-biz-card rounded-xl border border-biz-border overflow-hidden">
                <table class="w-full text-left text-sm text-biz-muted">
                    <thead class="bg-biz-bg text-xs uppercase border-b border-biz-border">
                        <tr>
                            <th class="px-6 py-3">Time</th>
                            <th class="px-6 py-3">Workflow</th>
                            <th class="px-6 py-3">Linked Order</th>
                            <th class="px-6 py-3">Error Type</th>
                            <th class="px-6 py-3">Message</th>
                            <th class="px-6 py-3">Status</th>
                        </tr>
                    </thead>
                    <tbody id="logs-list" class="divide-y divide-biz-border">
                        <tr>
                            <td colspan="6" class="px-6 py-4 text-center">Loading logs...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- ✅ ERROR DETAILS MODAL -->
    <div id="error-detail-modal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50">
        <div
            class="bg-biz-card border border-biz-border rounded-xl p-0 w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="bg-biz-bg border-b border-biz-border p-6 flex justify-between items-center">
                <div>
                    <h3 class="text-xl font-bold text-white">Error Log Details <span
                            class="text-biz-muted text-sm font-normal ml-2" id="modal-log-id"></span></h3>
                    <p class="text-sm text-biz-muted mt-1">Linked Order: <span class="text-white font-bold"
                            id="modal-linked-order"></span></p>
                </div>
                <button onclick="closeErrorModal()" class="text-biz-muted hover:text-white text-2xl">&times;</button>
            </div>

            <div class="p-6 space-y-6">
                <!-- Context Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-biz-bg p-4 rounded-lg border border-biz-border">
                        <h4 class="text-sm font-semibold text-biz-muted uppercase mb-3">Workflow Context</h4>
                        <div class="space-y-2 text-sm">
                            <div><span class="text-biz-muted">Type:</span>
                                <p class="text-white capitalize mt-1" id="modal-workflow-type"></p>
                            </div>
                            <div><span class="text-biz-muted">Step:</span>
                                <p class="text-white mt-1" id="modal-step"></p>
                            </div>
                            <div><span class="text-biz-muted">Created:</span>
                                <p class="text-white mt-1" id="modal-created"></p>
                            </div>
                        </div>
                    </div>
                    <div class="bg-biz-bg p-4 rounded-lg border border-biz-border">
                        <h4 class="text-sm font-semibold text-biz-muted uppercase mb-3">Error Details</h4>
                        <div class="space-y-2 text-sm">
                            <div><span class="text-biz-muted">Error Type:</span>
                                <p class="text-white capitalize mt-1" id="modal-error-type"></p>
                            </div>
                            <div><span class="text-biz-muted">Status:</span>
                                <p class="mt-1" id="modal-status"></p>
                            </div>
                            <div><span class="text-biz-muted">Resolved:</span>
                                <p class="text-white mt-1" id="modal-resolved"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Message -->
                <div class="bg-biz-bg p-4 rounded-lg border border-biz-border">
                    <h4 class="text-sm font-semibold text-biz-muted uppercase mb-2">Error Message</h4>
                    <p class="text-sm text-white bg-biz-card p-3 rounded border border-biz-border" id="modal-message">
                    </p>
                </div>

                <!-- Resolution Note (if any) -->
                <div id="resolution-section" class="bg-biz-bg p-4 rounded-lg border border-biz-border hidden">
                    <h4 class="text-sm font-semibold text-biz-muted uppercase mb-2">Resolution Note</h4>
                    <p class="text-sm text-white bg-biz-card p-3 rounded border border-biz-border"
                        id="modal-resolution-note"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navigation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (!BizLinkAuth.checkAuth()) return;
            BizLinkNav.init();
            loadLogs();
        });

        async function loadLogs() {
            const list = document.getElementById('logs-list');
            list.innerHTML = '<tr><td colspan="6" class="px-6 py-4 text-center text-biz-muted">Loading...</td></tr>';
            try {
                const logs = await BizLinkAPI.call('/error-logs');
                list.innerHTML = '';
                if (!logs || logs.length === 0) {
                    list.innerHTML = '<tr><td colspan="6" class="px-6 py-4 text-center text-biz-muted bg-biz-card">No errors found. System is healthy! ✅</td></tr>';
                    return;
                }

                logs.forEach(log => {
                    // ✅ FIX: Use created_at (backend field name)
                    const logTime = log.created_at ? new Date(log.created_at).toLocaleString() : 'Unknown';
                    const linkedId = log.workflow_run_id || 'N/A';
                    const isResolved = log.resolution_status === 'resolved';
                    const isEscalated = log.resolution_status === 'escalated';
                    const statusColor = isResolved ? 'text-biz-primary bg-green-900/20' :
                        isEscalated ? 'text-orange-400 bg-orange-900/20' :
                            'text-red-400 bg-red-900/20';
                    const statusText = isResolved ? 'Resolved' :
                        isEscalated ? 'Escalated' :
                            'Open';

                    list.innerHTML += `
                    <tr class="hover:bg-biz-bg transition-colors cursor-pointer" onclick="viewErrorDetails(${log.id})">
                        <td class="px-6 py-4 text-biz-muted text-xs whitespace-nowrap">${logTime}</td>
                        <td class="px-6 py-4 text-white font-medium capitalize">${log.workflow_type || 'Unknown'}</td>
                        <td class="px-6 py-4"><span class="px-2 py-1 rounded bg-blue-900/30 text-blue-400 text-xs font-bold">#${linkedId}</span></td>
                        <td class="px-6 py-4"><span class="px-2 py-1 rounded bg-biz-border text-xs text-white">${log.error_type || 'unknown'}</span></td>
                        <td class="px-6 py-4 text-biz-muted truncate max-w-xs" title="${log.error_message || ''}">${log.error_message || 'No message'}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="px-3 py-1 rounded-full text-xs font-bold ${statusColor}">${statusText}</span>
                        </td>
                    </tr>`;
                });
            } catch (err) {
                console.error('Failed to load logs:', err);
                list.innerHTML = `<tr><td colspan="6" class="px-6 py-4 text-center text-red-400">Failed to load logs.<br><span class="text-biz-muted text-xs">Ensure backend is running on port 8000</span></td></tr>`;
            }
        }

        async function viewErrorDetails(logId) {
            try {
                const log = await BizLinkAPI.call(`/error-logs/${logId}`);

                // Populate modal fields with correct field names
                document.getElementById('modal-log-id').textContent = `#${log.id}`;
                document.getElementById('modal-linked-order').textContent = `#${log.workflow_run_id || 'N/A'}`;
                document.getElementById('modal-workflow-type').textContent = log.workflow_type || 'N/A';
                document.getElementById('modal-step').textContent = log.step_name || 'N/A';
                document.getElementById('modal-created').textContent = log.created_at ? new Date(log.created_at).toLocaleString() : 'Unknown';
                document.getElementById('modal-error-type').textContent = log.error_type || 'N/A';

                const isResolved = log.resolution_status === 'resolved';
                const statusEl = document.getElementById('modal-status');
                statusEl.innerHTML = `<span class="px-2 py-1 rounded text-xs font-bold ${isResolved ? 'text-biz-primary bg-green-900/20' : 'text-red-400 bg-red-900/20'}">${log.resolution_status || 'Open'}</span>`;

                document.getElementById('modal-resolved').textContent = log.resolved_at ? new Date(log.resolved_at).toLocaleString() : 'Not yet resolved';
                document.getElementById('modal-message').textContent = log.error_message || 'No message';

                const resSection = document.getElementById('resolution-section');
                if (log.resolution_note) {
                    document.getElementById('modal-resolution-note').textContent = log.resolution_note;
                    resSection.classList.remove('hidden');
                } else {
                    resSection.classList.add('hidden');
                }

                // Show modal
                document.getElementById('error-detail-modal').classList.remove('hidden');
                document.getElementById('error-detail-modal').classList.add('flex');
            } catch (err) {
                console.error(err);
                alert('Failed to load error details. Check console.');
            }
        }

        function closeErrorModal() {
            document.getElementById('error-detail-modal').classList.add('hidden');
            document.getElementById('error-detail-modal').classList.remove('flex');
        }

        async function exportLogs() {
            try {
                const logs = await BizLinkAPI.call('/error-logs');
                const csv = [
                    ['Time', 'Workflow', 'Linked Order', 'Error Type', 'Message', 'Status'],
                    ...logs.map(log => [
                        log.created_at || 'Unknown',
                        log.workflow_type || 'Unknown',
                        log.workflow_run_id || 'N/A',
                        log.error_type || 'unknown',
                        log.error_message || 'No message',
                        log.resolution_status || 'Open'
                    ])
                ].map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');

                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `bizlink-error-logs-${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
                window.URL.revokeObjectURL(url);
            } catch (err) {
                alert('Failed to export logs: ' + err.message);
            }
        }
    </script>
</body>

</html>
