<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizLink - Leads</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        biz: {
                            bg: '#0f1419', card: '#161b22', border: '#21262d', sidebar: '#0d1117',
                            primary: '#22c55e', primaryDark: '#16a34a', text: '#e6edf3', muted: '#8b949e'
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #8b949e;
            border-left: 2px solid transparent;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background-color: #161b22;
            color: #e6edf3;
        }

        .nav-link.active {
            background-color: #161b22;
            color: #22c55e;
            border-left-color: #22c55e;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f1419;
        }

        ::-webkit-scrollbar-thumb {
            background: #21262d;
            border-radius: 4px;
        }
    </style>
</head>

<body class="bg-biz-bg text-biz-text font-sans flex h-screen overflow-hidden">
    <aside class="w-64 bg-biz-sidebar border-r border-biz-border flex flex-col flex-shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-biz-border">
            <span class="text-xl font-bold text-biz-primary">Biz<span class="text-white">Link</span></span>
        </div>
        <nav class="flex-1 py-4 overflow-y-auto"></nav>
        <div class="p-4 border-t border-biz-border bg-biz-sidebar">
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full bg-biz-primary flex items-center justify-center text-xs font-bold text-white"
                        id="user-avatar">U</div>
                    <div class="ml-3">
                        <p class="text-sm font-medium text-white" id="user-name">User</p>
                        <p class="text-xs text-biz-muted" id="user-role">Workspace</p>
                    </div>
                </div>
                <button onclick="BizLinkAuth.logout()" class="text-biz-muted hover:text-red-400 text-sm">Logout</button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-biz-card border-b border-biz-border flex justify-between items-center px-6">
            <h2 class="text-lg font-semibold">Lead Capture</h2>
            <button onclick="openNewLeadModal()"
                class="px-4 py-2 bg-biz-primary hover:bg-biz-primaryDark text-white rounded-lg text-sm font-medium transition">+
                Capture Lead</button>
        </header>

        <div class="flex-1 overflow-y-auto p-6">
            <!-- Stats Grid -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                <div class="bg-biz-card p-4 rounded-xl border border-biz-border">
                    <p class="text-biz-muted text-sm">Total Leads</p>
                    <p class="text-2xl font-bold text-white mt-1" id="stat-total">0</p>
                </div>
                <div class="bg-biz-card p-4 rounded-xl border border-biz-border">
                    <p class="text-biz-muted text-sm">Captured</p>
                    <p class="text-2xl font-bold text-blue-400 mt-1" id="stat-captured">0</p>
                </div>
                <div class="bg-biz-card p-4 rounded-xl border border-biz-border">
                    <p class="text-biz-muted text-sm">Notified (Slack)</p>
                    <p class="text-2xl font-bold text-green-400 mt-1" id="stat-notified">0</p>
                </div>
                <div class="bg-biz-card p-4 rounded-xl border border-biz-border">
                    <p class="text-biz-muted text-sm">Converted</p>
                    <p class="text-2xl font-bold text-yellow-400 mt-1" id="stat-converted">0</p>
                </div>
            </div>

            <!-- Filters -->
            <div class="bg-biz-card p-4 rounded-xl border border-biz-border mb-6">
                <div class="flex gap-4 flex-wrap">
                    <select id="filter-status"
                        class="bg-biz-bg border border-biz-border rounded-lg px-3 py-2 text-sm focus:border-biz-primary focus:outline-none">
                        <option value="">All Statuses</option>
                        <option value="captured">Captured</option>
                        <option value="notified">Notified</option>
                        <option value="converted">Converted</option>
                    </select>
                    <select id="filter-source"
                        class="bg-biz-bg border border-biz-border rounded-lg px-3 py-2 text-sm focus:border-biz-primary focus:outline-none">
                        <option value="">All Sources</option>
                        <option value="Website Form">Website Form</option>
                        <option value="Referral">Referral</option>
                        <option value="LinkedIn">LinkedIn</option>
                        <option value="Cold Outreach">Cold Outreach</option>
                    </select>
                    <button onclick="loadLeads()"
                        class="px-4 py-2 bg-biz-primary hover:bg-biz-primaryDark text-white rounded-lg text-sm transition">Apply
                        Filters</button>
                </div>
            </div>

            <!-- Leads Table -->
            <div class="bg-biz-card rounded-xl border border-biz-border overflow-hidden">
                <table class="w-full text-left text-sm text-biz-muted">
                    <thead class="bg-biz-bg text-xs uppercase">
                        <tr>
                            <th class="px-6 py-3">Lead ID</th>
                            <th class="px-6 py-3">Name</th>
                            <th class="px-6 py-3">Email</th>
                            <th class="px-6 py-3">Company</th>
                            <th class="px-6 py-3">Interest</th>
                            <th class="px-6 py-3">Source</th>
                            <th class="px-6 py-3">Status</th>
                            <th class="px-6 py-3">Slack</th>
                            <th class="px-6 py-3">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="leads-list" class="divide-y divide-biz-border">
                        <tr>
                            <td colspan="9" class="px-6 py-8 text-center text-biz-muted">Loading leads...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- New Lead Modal -->
    <div id="new-lead-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-biz-card border border-biz-border rounded-xl p-6 w-full max-w-2xl">
            <h3 class="text-lg font-semibold text-white mb-4">Capture New Lead</h3>
            <form id="new-lead-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm text-biz-muted mb-2">Name *</label><input type="text"
                            id="lead-name" required
                            class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg text-white focus:border-biz-primary focus:outline-none">
                    </div>
                    <div><label class="block text-sm text-biz-muted mb-2">Company</label><input type="text"
                            id="lead-company"
                            class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg text-white focus:border-biz-primary focus:outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm text-biz-muted mb-2">Email *</label><input type="email"
                            id="lead-email" required
                            class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg text-white focus:border-biz-primary focus:outline-none">
                    </div>
                    <div><label class="block text-sm text-biz-muted mb-2">Phone</label><input type="tel" id="lead-phone"
                            class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg text-white focus:border-biz-primary focus:outline-none">
                    </div>
                </div>

                <!-- ✅ NEW: Dropdown for Area of Interest -->
                <div>
                    <label class="block text-sm text-biz-muted mb-2">Area of Interest *</label>
                    <select id="lead-interest" required
                        class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg text-white focus:border-biz-primary focus:outline-none">
                        <option value="">Select a plan...</option>
                        <option value="Enterprise Plan">Enterprise Plan</option>
                        <option value="Standard Plan">Standard Plan</option>
                        <option value="Basic Plan">Basic Plan</option>
                        <option value="Custom Solution">Custom Solution</option>
                    </select>
                </div>

                <!-- ✅ NEW: Dropdown for Source -->
                <div>
                    <label class="block text-sm text-biz-muted mb-2">Source *</label>
                    <select id="lead-source" required
                        class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg text-white focus:border-biz-primary focus:outline-none">
                        <option value="">Select a source...</option>
                        <option value="Website Form">Website Form</option>
                        <option value="Referral">Referral</option>
                        <option value="LinkedIn">LinkedIn</option>
                        <option value="Cold Outreach">Cold Outreach</option>
                    </select>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="submit"
                        class="flex-1 px-4 py-2 bg-biz-primary hover:bg-biz-primaryDark text-white rounded-lg font-medium transition">Capture
                        & Notify Slack</button>
                    <button type="button" onclick="closeNewLeadModal()"
                        class="flex-1 px-4 py-2 bg-biz-card border border-biz-border hover:border-biz-primary text-biz-text rounded-lg font-medium transition">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navigation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (!BizLinkAuth.checkAuth()) return;
            BizLinkNav.init();
            loadLeads();
        });

        async function loadLeads() {
            const list = document.getElementById('leads-list');
            const statusFilter = document.getElementById('filter-status').value;
            const sourceFilter = document.getElementById('filter-source').value;

            try {
                let url = '/leads';
                const params = [];
                if (statusFilter) params.push(`status=${statusFilter}`);
                if (sourceFilter) params.push(`source=${sourceFilter}`);
                if (params.length > 0) url += `?${params.join('&')}`;

                const leads = await BizLinkAPI.call(url);

                document.getElementById('stat-total').textContent = leads.length;
                document.getElementById('stat-captured').textContent = leads.filter(l => l.status === 'captured').length;
                document.getElementById('stat-notified').textContent = leads.filter(l => l.status === 'notified').length;
                document.getElementById('stat-converted').textContent = leads.filter(l => l.status === 'converted').length;

                if (leads.length === 0) {
                    list.innerHTML = '<tr><td colspan="9" class="px-6 py-8 text-center text-biz-muted">No leads found</td></tr>';
                    return;
                }

                // ✅ UPDATED: Table now includes Interest and Source columns
                list.innerHTML = leads.map(lead => `
                    <tr class="hover:bg-biz-bg transition-colors">
                        <td class="px-6 py-4 font-medium text-white">#${lead.id}</td>
                        <td class="px-6 py-4 text-white">${lead.name}</td>
                        <td class="px-6 py-4 text-biz-muted">${lead.email}</td>
                        <td class="px-6 py-4 text-white">${lead.company || 'N/A'}</td>
                        <td class="px-6 py-4 text-biz-muted text-xs">${lead.area_of_interest || 'N/A'}</td>
                        <td class="px-6 py-4 text-biz-muted text-xs">${lead.source || 'N/A'}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 rounded text-xs ${getStatusBadge(lead.status)}">${lead.status}</span>
                        </td>
                        <td class="px-6 py-4">
                            ${lead.slack_sent ? '<span class="text-green-400 text-xs flex items-center gap-1">✓ Sent</span>' : '<span class="text-yellow-400 text-xs">⏳ Pending</span>'}
                        </td>
                        <td class="px-6 py-4">
                            <button onclick="viewLead(${lead.id})" class="text-biz-primary hover:underline text-sm">View</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error('Failed to load leads:', err);
                loadDemoLeads();
            }
        }

        function getStatusBadge(status) {
            const badges = {
                captured: 'bg-blue-900/30 text-blue-400',
                notified: 'bg-green-900/30 text-green-400',
                converted: 'bg-yellow-900/30 text-yellow-400'
            };
            return badges[status] || 'bg-gray-900/30 text-gray-400';
        }

        function loadDemoLeads() {
            const demoLeads = [
                { id: 1, name: 'John Doe', email: 'john@techcorp.com', company: 'Tech Corp', area_of_interest: 'Enterprise Plan', source: 'Website Form', status: 'notified', slack_sent: true },
                { id: 2, name: 'Jane Smith', email: 'jane@startup.io', company: 'Startup IO', area_of_interest: 'Standard Plan', source: 'LinkedIn', status: 'captured', slack_sent: false }
            ];

            const list = document.getElementById('leads-list');
            list.innerHTML = '<tr class="bg-yellow-900/10"><td colspan="9" class="px-6 py-2 text-center text-yellow-400 text-xs">⚠️ Showing demo data</td></tr>' +
                demoLeads.map(lead => `
                    <tr class="hover:bg-biz-bg transition-colors">
                        <td class="px-6 py-4 font-medium text-white">#${lead.id}</td>
                        <td class="px-6 py-4 text-white">${lead.name}</td>
                        <td class="px-6 py-4 text-biz-muted">${lead.email}</td>
                        <td class="px-6 py-4 text-white">${lead.company || 'N/A'}</td>
                        <td class="px-6 py-4 text-biz-muted text-xs">${lead.area_of_interest || 'N/A'}</td>
                        <td class="px-6 py-4 text-biz-muted text-xs">${lead.source || 'N/A'}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 rounded text-xs ${getStatusBadge(lead.status)}">${lead.status}</span>
                        </td>
                        <td class="px-6 py-4">
                            ${lead.slack_sent ? '<span class="text-green-400 text-xs flex items-center gap-1">✓ Sent</span>' : '<span class="text-yellow-400 text-xs">⏳ Pending</span>'}
                        </td>
                        <td class="px-6 py-4">
                            <button onclick="viewLead(${lead.id})" class="text-biz-primary hover:underline text-sm">View</button>
                        </td>
                    </tr>
                `).join('');
        }

        function openNewLeadModal() {
            document.getElementById('new-lead-modal').classList.remove('hidden');
            document.getElementById('new-lead-modal').classList.add('flex');
        }

        function closeNewLeadModal() {
            document.getElementById('new-lead-modal').classList.add('hidden');
            document.getElementById('new-lead-modal').classList.remove('flex');
            document.getElementById('new-lead-form').reset();
        }

        // ✅ UPDATED: Form submission reads from dropdowns
        document.getElementById('new-lead-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const leadData = {
                name: document.getElementById('lead-name').value,
                company: document.getElementById('lead-company').value,
                email: document.getElementById('lead-email').value,
                phone: document.getElementById('lead-phone').value,
                area_of_interest: document.getElementById('lead-interest').value,
                source: document.getElementById('lead-source').value
            };
            try {
                await BizLinkAPI.call('/leads', { method: 'POST', body: JSON.stringify(leadData) });
                alert('Lead captured and Slack notification sent!');
                closeNewLeadModal();
                loadLeads();
            } catch (err) {
                alert('Failed: ' + err.message);
            }
        });

        // ✅ NEW: View Lead Functionality
        async function viewLead(id) {
            try {
                const leads = await BizLinkAPI.call('/leads');
                const lead = leads.find(l => l.id === id);

                if (!lead) {
                    alert('Lead not found');
                    return;
                }

                const modalContent = `
                    <div class="fixed inset-0 bg-black/70 flex items-center justify-center z-50" id="view-lead-modal">
                        <div class="bg-biz-card border border-biz-border rounded-xl p-6 w-full max-w-2xl">
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="text-xl font-semibold text-white">Lead Details #${lead.id}</h3>
                                <button onclick="closeViewLeadModal()" class="text-biz-muted hover:text-white text-2xl">&times;</button>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-6 mb-6">
                                <div>
                                    <p class="text-biz-muted text-sm mb-1">Name</p>
                                    <p class="text-white font-medium">${lead.name}</p>
                                </div>
                                <div>
                                    <p class="text-biz-muted text-sm mb-1">Company</p>
                                    <p class="text-white">${lead.company || 'N/A'}</p>
                                </div>
                                <div>
                                    <p class="text-biz-muted text-sm mb-1">Email</p>
                                    <p class="text-white">${lead.email}</p>
                                </div>
                                <div>
                                    <p class="text-biz-muted text-sm mb-1">Phone</p>
                                    <p class="text-white">${lead.phone || 'N/A'}</p>
                                </div>
                                <div>
                                    <p class="text-biz-muted text-sm mb-1">Area of Interest</p>
                                    <p class="text-white">${lead.area_of_interest || 'N/A'}</p>
                                </div>
                                <div>
                                    <p class="text-biz-muted text-sm mb-1">Source</p>
                                    <p class="text-white">${lead.source || 'N/A'}</p>
                                </div>
                                <div>
                                    <p class="text-biz-muted text-sm mb-1">Status</p>
                                    <p class="text-white capitalize">${lead.status}</p>
                                </div>
                                <div>
                                    <p class="text-biz-muted text-sm mb-1">Slack Notified</p>
                                    <p class="text-white">${lead.slack_sent ? '✓ Yes' : '✗ No'}</p>
                                </div>
                            </div>
                            
                            <div class="flex justify-end">
                                <button onclick="closeViewLeadModal()" class="px-4 py-2 bg-biz-card border border-biz-border hover:border-biz-primary text-white rounded-lg transition">Close</button>
                            </div>
                        </div>
                    </div>
                `;

                document.body.insertAdjacentHTML('beforeend', modalContent);
            } catch (err) {
                console.error('Failed to load lead details:', err);
                alert('Failed to load lead details');
            }
        }

        function closeViewLeadModal() {
            const modal = document.getElementById('view-lead-modal');
            if (modal) {
                modal.remove();
            }
        }
    </script>
</body>

</html>
