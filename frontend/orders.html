<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizLink - Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        biz: {
                            bg: '#0f1419', card: '#161b22', border: '#21262d', sidebar: '#0d1117',
                            primary: '#22c55e', primaryDark: '#16a34a', text: '#e6edf3', muted: '#8b949e'
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #8b949e;
            border-left: 2px solid transparent;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background-color: #161b22;
            color: #e6edf3;
        }

        .nav-link.active {
            background-color: #161b22;
            color: #22c55e;
            border-left-color: #22c55e;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f1419;
        }

        ::-webkit-scrollbar-thumb {
            background: #21262d;
            border-radius: 4px;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-received {
            background: #1e3a5f;
            color: #60a5fa;
        }

        .status-processing {
            background: #3f2e00;
            color: #fbbf24;
        }

        .status-notified {
            background: #0f4c3a;
            color: #34d399;
        }

        .status-paused {
            background: #4c1d1d;
            color: #f87171;
        }

        .status-completed {
            background: #064e3b;
            color: #10b981;
        }

        .status-manual_review {
            background: #7c2d12;
            color: #fb923c;
        }
    </style>
</head>

<body class="bg-biz-bg text-biz-text font-sans flex h-screen overflow-hidden">
    <aside class="w-64 bg-biz-sidebar border-r border-biz-border flex flex-col flex-shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-biz-border">
            <span class="text-xl font-bold text-biz-primary">Biz<span class="text-white">Link</span></span>
        </div>
        <nav class="flex-1 py-4 overflow-y-auto"></nav>
        <div class="p-4 border-t border-biz-border bg-biz-sidebar">
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full bg-biz-primary flex items-center justify-center text-xs font-bold text-white"
                        id="user-avatar">U</div>
                    <div class="ml-3">
                        <p class="text-sm font-medium text-white" id="user-name">User</p>
                        <p class="text-xs text-biz-muted" id="user-role">Workspace</p>
                    </div>
                </div>
                <button onclick="BizLinkAuth.logout()" class="text-biz-muted hover:text-red-400 text-sm">Logout</button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-biz-card border-b border-biz-border flex justify-between items-center px-6">
            <h2 class="text-lg font-semibold">Order Management</h2>
            <button onclick="openNewOrderModal()"
                class="px-4 py-2 bg-biz-primary hover:bg-biz-primaryDark text-white rounded-lg text-sm font-medium transition">+
                New Order</button>
        </header>

        <div class="flex-1 overflow-y-auto p-6">
            <!-- Stats Row -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                <div class="bg-biz-card p-4 rounded-xl border border-biz-border">
                    <p class="text-biz-muted text-sm">Total Orders</p>
                    <p class="text-2xl font-bold text-white mt-1" id="stat-total">0</p>
                </div>
                <div class="bg-biz-card p-4 rounded-xl border border-biz-border">
                    <p class="text-biz-muted text-sm">Processing</p>
                    <p class="text-2xl font-bold text-yellow-400 mt-1" id="stat-processing">0</p>
                </div>
                <div class="bg-biz-card p-4 rounded-xl border border-biz-border">
                    <p class="text-biz-muted text-sm">Paused/Errors</p>
                    <p class="text-2xl font-bold text-red-400 mt-1" id="stat-paused">0</p>
                </div>
                <div class="bg-biz-card p-4 rounded-xl border border-biz-border">
                    <p class="text-biz-muted text-sm">Completed</p>
                    <p class="text-2xl font-bold text-green-400 mt-1" id="stat-completed">0</p>
                </div>
            </div>

            <!-- Filters -->
            <div class="bg-biz-card p-4 rounded-xl border border-biz-border mb-6">
                <div class="flex gap-4 flex-wrap">
                    <select id="filter-status"
                        class="bg-biz-bg border border-biz-border rounded-lg px-3 py-2 text-sm focus:border-biz-primary focus:outline-none">
                        <option value="">All Statuses</option>
                        <option value="received">Received</option>
                        <option value="processing">Processing</option>
                        <option value="notified">Notified</option>
                        <option value="paused">Paused</option>
                        <!-- REMOVE: Manual Review option -->
                        <option value="completed">Completed</option>
                        <!-- ADD: Cancelled option -->
                        <option value="cancelled">Cancelled</option>
                    </select>
                    <input type="date" id="filter-date"
                        class="bg-biz-bg border border-biz-border rounded-lg px-3 py-2 text-sm focus:border-biz-primary focus:outline-none">
                    <button onclick="loadOrders()"
                        class="px-4 py-2 bg-biz-primary hover:bg-biz-primaryDark text-white rounded-lg text-sm transition">Apply
                        Filters</button>
                </div>
            </div>

            <!-- Orders Table -->
            <div class="bg-biz-card rounded-xl border border-biz-border overflow-hidden">
                <table class="w-full text-left text-sm text-biz-muted">
                    <thead class="bg-biz-bg text-xs uppercase">
                        <tr>
                            <th class="px-6 py-3">Order ID</th>
                            <th class="px-6 py-3">Customer</th>
                            <th class="px-6 py-3">Product</th>
                            <th class="px-6 py-3">Amount</th>
                            <th class="px-6 py-3">Payment</th>
                            <th class="px-6 py-3">Status</th>
                            <th class="px-6 py-3">Workflow</th>
                            <th class="px-6 py-3">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="orders-list" class="divide-y divide-biz-border">
                        <tr>
                            <td colspan="8" class="px-6 py-8 text-center text-biz-muted">Loading orders...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>


    <!-- New Order Modal -->
    <div id="new-order-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-biz-card border border-biz-border rounded-xl p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-lg font-semibold text-white mb-4">Create New Order</h3>
            <form id="new-order-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-biz-muted mb-2">Customer Name *</label>
                        <input type="text" id="order-customer-name" required
                            class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg text-white focus:border-biz-primary focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-biz-muted mb-2">Customer Contact *</label>
                        <input type="text" id="order-customer-contact" required
                            class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg text-white focus:border-biz-primary focus:outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-sm text-biz-muted mb-2">Product Details *</label>
                    <textarea id="order-product-details" required rows="3"
                        class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg text-white focus:border-biz-primary focus:outline-none"></textarea>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm text-biz-muted mb-2">Quantity *</label>
                        <input type="number" id="order-quantity" required min="1"
                            class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg text-white focus:border-biz-primary focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-biz-muted mb-2">Total Price *</label>
                        <input type="number" id="order-total-price" required min="0" step="0.01"
                            class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg text-white focus:border-biz-primary focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-biz-muted mb-2">Payment Method *</label>
                        <select id="order-payment-method" required
                            class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg text-white focus:border-biz-primary focus:outline-none">
                            <option value="credit_card">Credit Card</option>
                            <option value="paypal">PayPal</option>
                            <option value="bank_transfer">Bank Transfer</option>
                            <option value="cash">Cash</option>
                        </select>

                    </div>
                </div>

                <!-- ✅ NEW: Payment Status Selector -->
                <div>
                    <label class="block text-sm text-biz-muted mb-2">Payment Status *</label>
                    <select id="order-payment-status" required
                        class="w-full p-3 bg-biz-bg border border-biz-border rounded-lg text-white focus:border-biz-primary focus:outline-none">
                        <option value="pending">Pending (Normal Flow)</option>
                        <option value="paid">Paid (Auto-Complete)</option>
                        <option value="failed">Failed (Triggers Pause & Review)</option>
                    </select>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="submit"
                        class="flex-1 px-4 py-2 bg-biz-primary hover:bg-biz-primaryDark text-white rounded-lg font-medium transition">Create
                        Order</button>
                    <button type="button" onclick="closeNewOrderModal()"
                        class="flex-1 px-4 py-2 bg-biz-card border border-biz-border hover:border-biz-primary text-biz-text rounded-lg font-medium transition">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Order Detail Modal -->
    <div id="order-detail-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-biz-card border border-biz-border rounded-xl p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <div id="order-detail-content"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navigation.js"></script>
    <script>
        // Global variable to store loaded orders for the detail modal
        let currentOrders = [];

        document.addEventListener('DOMContentLoaded', function () {
            if (!BizLinkAuth.checkAuth()) return;
            BizLinkNav.init();
            loadOrders();
        });

        async function loadOrders() {
            const list = document.getElementById('orders-list');
            const statusFilter = document.getElementById('filter-status').value;
            const dateFilter = document.getElementById('filter-date').value; // ✅ Capture Date

            try {
                let url = '/orders';
                const params = [];
                if (statusFilter) params.push(`status=${statusFilter}`);
                if (dateFilter) params.push(`date=${dateFilter}`); // ✅ Add Date to URL

                if (params.length > 0) url += `?${params.join('&')}`;

                const orders = await BizLinkAPI.call(url);
                currentOrders = orders; // ✅ Save to global variable

                // Update stats
                document.getElementById('stat-total').textContent = orders.length;
                document.getElementById('stat-processing').textContent = orders.filter(o => o.workflow_status === 'processing').length;
                document.getElementById('stat-paused').textContent = orders.filter(o => ['paused', 'manual_review'].includes(o.workflow_status)).length;
                document.getElementById('stat-completed').textContent = orders.filter(o => o.workflow_status === 'completed').length;

                if (orders.length === 0) {
                    list.innerHTML = '<tr><td colspan="8" class="px-6 py-8 text-center text-biz-muted">No orders found</td></tr>';
                    return;
                }

                list.innerHTML = orders.map(order => `
                    <tr class="hover:bg-biz-bg transition-colors">
                        <td class="px-6 py-4 font-medium text-white">#${order.id}</td>
                        <td class="px-6 py-4">
                        ${order.workflow_status === 'paused' || order.workflow_status === 'manual_review' ?
                        '<span class="text-red-400 text-xs flex items-center gap-1">⚠️ Needs Review</span>' :
                        order.workflow_status === 'cancelled' ?
                            '<span class="text-red-400 text-xs flex items-center gap-1">✗ Cancelled</span>' :
                            '<span class="text-green-400 text-xs">✓ On Track</span>'}
                        </td>
                        <td class="px-6 py-4 max-w-xs truncate">${order.product_details}</td>
                        <td class="px-6 py-4 text-white">$${order.total_price}</td>
                        <td class="px-6 py-4"><span class="px-2 py-1 rounded text-xs ${getPaymentBadge(order.payment_status)}">${order.payment_status}</span></td>
                        <td class="px-6 py-4"><span class="status-badge status-${order.workflow_status}">${order.workflow_status.replace('_', ' ')}</span></td>
                        <td class="px-6 py-4">
                            ${order.workflow_status === 'paused' || order.workflow_status === 'manual_review' ?
                        '<span class="text-red-400 text-xs flex items-center gap-1">⚠️ Needs Review</span>' :
                        '<span class="text-green-400 text-xs">✓ On Track</span>'}
                        </td>
                        <td class="px-6 py-4">
                            <button onclick="viewOrder(${order.id})" class="text-biz-primary hover:underline text-sm">View</button>
                            ${['paused', 'manual_review'].includes(order.workflow_status) ?
                        `<button onclick="reviewOrder(${order.id})" class="text-yellow-400 hover:underline text-sm ml-3">Review</button>` : ''}
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error('Failed to load orders:', err);
                list.innerHTML = `<tr><td colspan="8" class="px-6 py-8 text-center text-red-400">Failed to load orders.<br><span class="text-biz-muted text-xs">Ensure backend is running on port 8000</span></td></tr>`;
            }
        }

        // ✅ UPDATED: View Order Modal with Real Data
        function viewOrder(orderId) {
            const order = currentOrders.find(o => o.id === orderId);
            if (!order) return;

            const content = document.getElementById('order-detail-content');
            content.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-white">Order Details #${order.id}</h3>
                    <span class="status-badge status-${order.workflow_status}">${order.workflow_status.replace('_', ' ').toUpperCase()}</span>
                </div>
                <div class="grid grid-cols-2 gap-6 mb-6">
                    <div>
                        <p class="text-biz-muted text-xs uppercase">Customer Name</p>
                        <p class="text-white text-lg">${order.customer_name}</p>
                    </div>
                    <div>
                        <p class="text-biz-muted text-xs uppercase">Contact</p>
                        <p class="text-white">${order.customer_contact}</p>
                    </div>
                    <div>
                        <p class="text-biz-muted text-xs uppercase">Product</p>
                        <p class="text-white">${order.product_details}</p>
                    </div>
                    <div>
                        <p class="text-biz-muted text-xs uppercase">Total Amount</p>
                        <p class="text-biz-primary text-2xl font-bold">$${order.total_price}</p>
                    </div>
                    <div>
                        <p class="text-biz-muted text-xs uppercase">Payment Status</p>
                        <p class="text-white">${order.payment_status}</p>
                    </div>
                    <div>
                        <p class="text-biz-muted text-xs uppercase">Created At</p>
                        <p class="text-white">${new Date(order.created_at).toLocaleString()}</p>
                    </div>
                </div>
                <div class="flex justify-end gap-3">
                    <button onclick="document.getElementById('order-detail-modal').classList.add('hidden'); document.getElementById('order-detail-modal').classList.remove('flex')" class="px-4 py-2 bg-biz-card border border-biz-border rounded text-white hover:bg-biz-border transition">Close</button>
                </div>
            `;
            document.getElementById('order-detail-modal').classList.remove('hidden');
            document.getElementById('order-detail-modal').classList.add('flex');
        }

        function reviewOrder(orderId) {
            // Navigate to reviews page
            window.location.href = `reviews.html?order_id=${orderId}`;
        }

        function getPaymentBadge(status) {
            const badges = { pending: 'bg-yellow-900/30 text-yellow-400', paid: 'bg-green-900/30 text-green-400', failed: 'bg-red-900/30 text-red-400', refunded: 'bg-blue-900/30 text-blue-400' };
            return badges[status] || 'bg-gray-900/30 text-gray-400';
        }

        function openNewOrderModal() { document.getElementById('new-order-modal').classList.remove('hidden'); document.getElementById('new-order-modal').classList.add('flex'); }
        function closeNewOrderModal() { document.getElementById('new-order-modal').classList.add('hidden'); document.getElementById('new-order-modal').classList.remove('flex'); document.getElementById('new-order-form').reset(); }

        document.getElementById('new-order-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const orderData = {
                customer_name: document.getElementById('order-customer-name').value,
                customer_contact: document.getElementById('order-customer-contact').value,
                product_details: document.getElementById('order-product-details').value,
                quantity: parseInt(document.getElementById('order-quantity').value),
                total_price: parseFloat(document.getElementById('order-total-price').value),
                payment_method: document.getElementById('order-payment-method').value,
                // ✅ FIX: Read the status from the new dropdown instead of hardcoding it
                payment_status: document.getElementById('order-payment-status').value
            };

            try {
                await BizLinkAPI.call('/orders', {
                    method: 'POST',
                    body: JSON.stringify(orderData)
                });
                alert('Order created successfully!');
                closeNewOrderModal();
                loadOrders(); // Refresh the table
            } catch (err) {
                alert('Failed to create order: ' + err.message);
            }
        });
    </script>
</body>

</html>
